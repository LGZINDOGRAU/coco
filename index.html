<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clima Agora</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --card: #111827;
      --border: rgba(255,255,255,0.07);
      --accent: #38bdf8;
      --accent2: #818cf8;
      --text: #f0f4ff;
      --muted: #6b7280;
      --danger: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 1.5rem 1rem 4rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.1) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.12) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.08) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.1) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 6vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.2rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 1.25rem;
    }

    .search-row {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }

    input {
      flex: 1;
      min-width: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    button {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      padding: 0.75rem 1.1rem;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.97); }

    .btn-location {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 1.1rem;
      padding: 0.75rem 0.9rem;
    }

    .error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--danger);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 0.9rem;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .main-weather {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .weather-left { flex: 1; min-width: 0; }

    .city-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.1rem, 4.5vw, 1.4rem);
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .country {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 0.1rem;
    }

    .weather-desc {
      color: var(--muted);
      font-size: 0.88rem;
      text-transform: capitalize;
      margin-top: 0.3rem;
    }

    .weather-right {
      text-align: right;
      flex-shrink: 0;
    }

    /* \u00cdCONE CORRIGIDO - usando img ao inv\u00e9s de emoji direto */
    .weather-icon {
      font-size: 2.8rem;
      line-height: 1;
      display: block;
      text-align: right;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
    }

    .temp-big {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 10vw, 4rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 0.1rem;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 1rem 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .stat {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 0.7rem 0.9rem;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.2rem;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 0.7rem;
    }

    .hourly-scroll {
      display: flex;
      gap: 0.45rem;
      overflow-x: auto;
      padding-bottom: 0.25rem;
      scrollbar-width: none;
    }
    .hourly-scroll::-webkit-scrollbar { display: none; }

    .hour-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 0.55rem 0.7rem;
      min-width: 54px;
      flex-shrink: 0;
      font-size: 0.8rem;
    }

    .hour-item .hi { color: var(--muted); font-size: 0.68rem; }
    .hour-item .hicon {
      font-size: 1.4rem;
      line-height: 1;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
    }
    .hour-item .ht { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; }

    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, rgba(255,255,255,0.05) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
      height: 1rem;
      display: block;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    #loading {
      display: none;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .update-time {
      text-align: center;
      color: var(--muted);
      font-size: 0.7rem;
      margin-top: 0.25rem;
    }

    #results { display: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>\u26c5 Clima Agora</h1>
  <p class="subtitle">Tempo real em qualquer cidade do mundo</p>

  <div class="search-row">
    <input type="text" id="cityInput" placeholder="Digite uma cidade..." />
    <button class="btn-location" onclick="getLocation()" title="Usar minha localiza\u00e7\u00e3o">\ud83d\udccd</button>
    <button onclick="searchCity()">Buscar</button>
  </div>

  <div class="error" id="errorMsg"></div>

  <div id="loading">
    <div style="background:var(--card);border-radius:20px;padding:1.5rem;">
      <span class="skeleton" style="width:60%;margin-bottom:0.5rem;"></span>
      <span class="skeleton" style="width:40%;"></span>
    </div>
  </div>

  <div id="results">
    <div class="card" style="animation-delay:0s">
      <div class="main-weather">
        <div class="weather-left">
          <div class="city-name" id="cityName">\u2014</div>
          <div class="country" id="countryName"></div>
          <div class="weather-desc" id="weatherDesc">\u2014</div>
        </div>
        <div class="weather-right">
          <span class="weather-icon" id="weatherIcon">\ud83c\udf24\ufe0f</span>
          <div class="temp-big" id="tempBig">\u2014\u00b0</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="stats-grid">
        <div class="stat">
          <div class="stat-label">Sensa\u00e7\u00e3o</div>
          <div class="stat-value" id="feelsLike">\u2014</div>
        </div>
        <div class="stat">
          <div class="stat-label">Umidade</div>
          <div class="stat-value" id="humidity">\u2014</div>
        </div>
        <div class="stat">
          <div class="stat-label">Vento</div>
          <div class="stat-value" id="wind">\u2014</div>
        </div>
        <div class="stat">
          <div class="stat-label">Visibilidade</div>
          <div class="stat-value" id="visibility">\u2014</div>
        </div>
      </div>
    </div>

    <div class="card" style="animation-delay:0.1s">
      <div class="section-title">Pr\u00f3ximas horas</div>
      <div class="hourly-scroll" id="hourlyRow"></div>
    </div>

    <div class="update-time" id="updateTime"></div>
  </div>
</div>
